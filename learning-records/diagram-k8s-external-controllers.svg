<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d29922"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bc8cff"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="1600" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="bold">Kubernetes Controller Lifecycle — External Controllers in Crossplane</text>
  <text x="450" y="62" text-anchor="middle" fill="#8b949e" font-size="13">How controllers watch, reconcile, and act across the Crossplane stack</text>

  <!-- ============================================================ -->
  <!-- SECTION: Resource Creation -->
  <!-- ============================================================ -->
  <rect x="20" y="80" width="860" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="105" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="bold" letter-spacing="2">PHASE 1: RESOURCE CREATION</text>

  <!-- User creates Claim -->
  <rect x="80" y="140" width="200" height="70" rx="8" fill="rgba(188,140,255,0.12)" stroke="#bc8cff" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="170" text-anchor="middle" fill="#bc8cff" font-size="14" font-weight="bold">User creates Claim</text>
  <text x="180" y="192" text-anchor="middle" fill="#c9d1d9" font-size="12">VirtualMachineClaim</text>
  <text x="180" y="208" text-anchor="middle" fill="#8b949e" font-size="11">apiVersion: infra.example.com/v1alpha1</text>

  <!-- Arrow down -->
  <line x1="180" y1="210" x2="180" y2="240" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="228" fill="#58a6ff" font-size="10">claim controller watches</text>

  <!-- Claim Controller -->
  <rect x="80" y="240" width="200" height="70" rx="8" fill="rgba(88,166,255,0.12)" stroke="#58a6ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="270" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">Claim Controller</text>
  <text x="180" y="292" text-anchor="middle" fill="#c9d1d9" font-size="12">Copies spec.parameters → XR spec</text>
  <text x="180" y="308" text-anchor="middle" fill="#8b949e" font-size="11">Writes XR → API Server</text>

  <!-- Arrow down -->
  <line x1="180" y1="310" x2="180" y2="340" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="328" fill="#58a6ff" font-size="10">XR created</text>

  <!-- XR exists -->
  <rect x="80" y="340" width="200" height="70" rx="8" fill="rgba(188,140,255,0.08)" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="180" y="370" text-anchor="middle" fill="#bc8cff" font-size="14" font-weight="bold">XR created</text>
  <text x="180" y="392" text-anchor="middle" fill="#c9d1d9" font-size="12">XVirtualMachine</text>
  <text x="180" y="408" text-anchor="middle" fill="#8b949e" font-size="11">spec.parameters → spec</text>

  <!-- ============================================================ -->
  <!-- SECTION: Crossplane Controller Layer -->
  <!-- ============================================================ -->
  <rect x="20" y="430" width="860" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="455" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="bold" letter-spacing="2">PHASE 2: CROSSPLANE COMPOSITION</text>

  <!-- Composition Controller -->
  <rect x="80" y="480" width="200" height="70" rx="8" fill="rgba(210,153,34,0.12)" stroke="#d29922" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="510" text-anchor="middle" fill="#d29922" font-size="14" font-weight="bold">Composition Controller</text>
  <text x="180" y="532" text-anchor="middle" fill="#c9d1d9" font-size="12">Watches XR, executes Composition</text>
  <text x="180" y="548" text-anchor="middle" fill="#8b949e" font-size="11">Creates Managed Resources</text>

  <!-- Arrow down -->
  <line x1="180" y1="550" x2="180" y2="580" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="568" fill="#58a6ff" font-size="10">Managed Resources created</text>

  <!-- Managed Resources -->
  <rect x="80" y="580" width="200" height="70" rx="8" fill="rgba(63,185,80,0.08)" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="180" y="610" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="bold">Managed Resources</text>
  <text x="180" y="632" text-anchor="middle" fill="#c9d1d9" font-size="12">VirtualMachine, DataVolume, PVC</text>
  <text x="180" y="648" text-anchor="middle" fill="#8b949e" font-size="11">apiVersion: kubevirt.io/v1</text>

  <!-- ============================================================ -->
  <!-- SECTION: Provider Layer -->
  <!-- ============================================================ -->
  <rect x="20" y="670" width="860" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="695" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="bold" letter-spacing="2">PHASE 3: PROVIDER RECONCILIATION</text>

  <!-- Provider Controller -->
  <rect x="80" y="720" width="200" height="70" rx="8" fill="rgba(63,185,80,0.12)" stroke="#3fb950" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="750" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="bold">Provider Controller</text>
  <text x="180" y="772" text-anchor="middle" fill="#c9d1d9" font-size="12">Watches Managed Resources</text>
  <text x="180" y="788" text-anchor="middle" fill="#8b949e" font-size="11">Calls target API (KubeVirt)</text>

  <!-- Arrow down -->
  <line x1="180" y1="790" x2="180" y2="820" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="808" fill="#58a6ff" font-size="10">API call → target system</text>

  <!-- Target System -->
  <rect x="80" y="820" width="200" height="70" rx="8" fill="rgba(57,210,192,0.08)" stroke="#39d2c0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="180" y="850" text-anchor="middle" fill="#39d2c0" font-size="14" font-weight="bold">Target System</text>
  <text x="180" y="872" text-anchor="middle" fill="#c9d1d9" font-size="12">OpenShift / KubeVirt API</text>
  <text x="180" y="888" text-anchor="middle" fill="#8b949e" font-size="11">Creates actual VM</text>

  <!-- Arrow up (status update) -->
  <line x1="180" y1="890" x2="180" y2="920" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="190" y="908" fill="#3fb950" font-size="10">status.atProvider updated</text>

  <!-- XR Status Ready -->
  <rect x="80" y="920" width="200" height="70" rx="8" fill="rgba(63,185,80,0.12)" stroke="#3fb950" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="950" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="bold">XR → Ready ✓</text>
  <text x="180" y="972" text-anchor="middle" fill="#c9d1d9" font-size="12">status.conditions[Ready]=True</text>
  <text x="180" y="988" text-anchor="middle" fill="#8b949e" font-size="11">status.atProvider populated</text>

  <!-- ============================================================ -->
  <!-- SECTION: External Controller Layer -->
  <!-- ============================================================ -->
  <rect x="20" y="1010" width="860" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="1035" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="bold" letter-spacing="2">PHASE 4: EXTERNAL CONTROLLER (INFOBLOX EXAMPLE)</text>

  <!-- Informer Cache -->
  <rect x="80" y="1060" width="200" height="70" rx="8" fill="rgba(57,210,192,0.12)" stroke="#39d2c0" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="1090" text-anchor="middle" fill="#39d2c0" font-size="14" font-weight="bold">Informer Cache</text>
  <text x="180" y="1112" text-anchor="middle" fill="#c9d1d9" font-size="12">Watches XR status changes</text>
  <text x="180" y="1128" text-anchor="middle" fill="#8b949e" font-size="11">Local copy of XR objects</text>

  <!-- Arrow down -->
  <line x1="180" y1="1130" x2="180" y2="1160" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="1148" fill="#58a6ff" font-size="10">event: XR Ready + no IP</text>

  <!-- Reconcile Loop -->
  <rect x="80" y="1160" width="200" height="70" rx="8" fill="rgba(88,166,255,0.12)" stroke="#58a6ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="1190" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">Reconcile Loop</text>
  <text x="180" y="1212" text-anchor="middle" fill="#c9d1d9" font-size="12">Fetch XR → Check state → Act</text>
  <text x="180" y="1228" text-anchor="middle" fill="#8b949e" font-size="11">Idempotent, with finalizers</text>

  <!-- Arrow down -->
  <line x1="180" y1="1230" x2="180" y2="1260" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="1248" fill="#58a6ff" font-size="10">Call InfoBlox WAPI</text>

  <!-- External API Call -->
  <rect x="80" y="1260" width="200" height="70" rx="8" fill="rgba(210,153,34,0.12)" stroke="#d29922" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="1290" text-anchor="middle" fill="#d29922" font-size="14" font-weight="bold">External API Call</text>
  <text x="180" y="1312" text-anchor="middle" fill="#c9d1d9" font-size="12">InfoBlox WAPI /nominate</text>
  <text x="180" y="1328" text-anchor="middle" fill="#8b949e" font-size="11">POST /record:a → reserves IP</text>

  <!-- Arrow down -->
  <line x1="180" y1="1330" x2="180" y2="1360" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="1348" fill="#58a6ff" font-size="10">IP allocated: 10.20.30.45</text>

  <!-- Write Status -->
  <rect x="80" y="1360" width="200" height="70" rx="8" fill="rgba(188,140,255,0.12)" stroke="#bc8cff" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="1390" text-anchor="middle" fill="#bc8cff" font-size="14" font-weight="bold">Write XR Status</text>
  <text x="180" y="1412" text-anchor="middle" fill="#c9d1d9" font-size="12">status.atProvider.ipAddress</text>
  <text x="180" y="1428" text-anchor="middle" fill="#8b949e" font-size="11">status.conditions[Assigned]=True</text>

  <!-- ============================================================ -->
  <!-- SECTION: Feedback Loop -->
  <!-- ============================================================ -->
  <rect x="20" y="1450" width="860" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="1475" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="bold" letter-spacing="2">PHASE 5: FEEDBACK LOOP</text>

  <!-- Composition reads status -->
  <rect x="80" y="1500" width="200" height="70" rx="8" fill="rgba(210,153,34,0.12)" stroke="#d29922" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="1530" text-anchor="middle" fill="#d29922" font-size="14" font-weight="bold">Composition reads status</text>
  <text x="180" y="1552" text-anchor="middle" fill="#c9d1d9" font-size="12">Go-Templating: .XR.status.atProvider</text>
  <text x="180" y="1568" text-anchor="middle" fill="#8b949e" font-size="11">Patches IP into VM network config</text>

  <!-- Arrow right to external system label -->
  <line x1="280" y1="1535" x2="350" y2="1535" stroke="#d29922" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="315" y="1525" text-anchor="middle" fill="#d29922" font-size="10">VM gets IP</text>

  <!-- External system box (right side) -->
  <rect x="450" y="1490" width="410" height="100" rx="8" fill="rgba(57,210,192,0.06)" stroke="#39d2c0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="655" y="1515" text-anchor="middle" fill="#39d2c0" font-size="14" font-weight="bold">External Controller Lifecycle</text>

  <text x="470" y="1538" fill="#c9d1d9" font-size="11">1. Informer watches XR changes → triggers Reconcile</text>
  <text x="470" y="1556" fill="#c9d1d9" font-size="11">2. Reconcile fetches XR, checks idempotency (IP already assigned?)</text>
  <text x="470" y="1574" fill="#c9d1d9" font-size="11">3. Calls external API (InfoBlox) with retry/backoff on failure</text>
  <text x="470" y="1592" fill="#c9d1d9" font-size="11">4. Writes result to XR status → triggers Composition update</text>
  <text x="470" y="1610" fill="#c9d1d9" font-size="11">5. On XR delete: finalizer → release IP → remove finalizer → GC</text>

</svg>
